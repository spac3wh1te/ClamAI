name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.5.64)"
        required: false
        type: string

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  RUST_VERSION: "stable"

jobs:
  frontend:
    name: Frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  go-service:
    name: Go Service (${{ matrix.target }})
    runs-on: windows-latest
    needs: frontend
    strategy:
      matrix:
        include:
          - target: x86_64-win
            goos: windows
            goarch: amd64
            output: ClamAI-Server.exe
          - target: x86_64-linux
            goos: linux
            goarch: amd64
            output: ClamAI-Server
          - target: arm64-win
            goos: windows
            goarch: arm64
            output: ClamAI-Server.exe
          - target: arm64-linux
            goos: linux
            goarch: arm64
            output: ClamAI-Server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - shell: pwsh
        run: |
          if (-not (Test-Path "server\frontend")) { New-Item -ItemType Directory -Path "server\frontend" -Force }
          Copy-Item -Recurse -Force dist\* server\frontend\dist\
      - shell: pwsh
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) {
            $tag = "${{ github.ref_name }}"
            $ver = $tag -replace '^v',''
          }
          $ldflags = ""
          if ("${{ matrix.goos }}" -eq "windows") { $ldflags = "-H windowsgui" }
          $ldflags += " -X main.BuildVersion=$ver"
          cd server
          go build -ldflags="$($ldflags.Trim())" -tags server -o "${{ matrix.output }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: service-${{ matrix.target }}
          path: server/${{ matrix.output }}

  tauri-windows:
    name: Tauri Windows (${{ matrix.target }})
    runs-on: windows-latest
    needs: frontend
    strategy:
      matrix:
        include:
          - target: x86_64-win
            rust-target: x86_64-pc-windows-msvc
          - target: arm64-win
            rust-target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Install frontend deps
        run: npm ci
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }}
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/clamai.exe

  tauri-linux:
    name: Tauri Linux (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: frontend
    strategy:
      matrix:
        include:
          - target: x86_64-linux
            rust-target: x86_64-unknown-linux-gnu
          - target: arm64-linux
            rust-target: aarch64-unknown-linux-gnu
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - name: Install ARM64 cross tools
        if: matrix.rust-target == 'aarch64-unknown-linux-gnu'
        run: |
          sudo apt-get install -y gcc-aarch64-linux-gnu
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - name: Install frontend deps
        run: npm ci
      - name: Build Tauri
        if: matrix.rust-target == 'x86_64-unknown-linux-gnu'
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }}
      - name: Cross-build Tauri ARM64
        if: matrix.rust-target == 'aarch64-unknown-linux-gnu'
        env:
          CC_aarch64_unknown_linux_gnu: aarch64-linux-gnu-gcc
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc
          PKG_CONFIG_PATH: /usr/lib/aarch64-linux-gnu/pkgconfig
        working-directory: src-tauri
        run: |
          sudo dpkg --add-architecture arm64
          sudo sed -i 's/deb/deb [arch=amd64,arm64]/' /etc/apt/sources.list
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev:arm64 libappindicator3-dev:arm64 librsvg2-dev:arm64 libssl-dev:arm64
          cargo build --release --target ${{ matrix.rust-target }} --features custom-protocol
          mkdir -p target/${{ matrix.rust-target }}/release/bundle
          cp target/${{ matrix.rust-target }}/release/clamai target/${{ matrix.rust-target }}/release/bundle/ 2>/dev/null || true
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.deb
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/**/*.AppImage
            src-tauri/target/${{ matrix.rust-target }}/release/clamai

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [go-service, tauri-windows, tauri-linux]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Organize artifacts
        run: |
          mkdir -p release
          cp artifacts/service-x86_64-win/ClamAI-Server.exe       release/ClamAI-Server-x86_64-win.exe
          cp artifacts/service-x86_64-linux/ClamAI-Server         release/ClamAI-Server-x86_64-linux
          cp artifacts/service-arm64-win/ClamAI-Server.exe        release/ClamAI-Server-arm64-win.exe
          cp artifacts/service-arm64-linux/ClamAI-Server          release/ClamAI-Server-arm64-linux
          cp artifacts/tauri-x86_64-win/clamai.exe                 release/ClamAI-x86_64-win.exe 2>/dev/null || true
          find artifacts/tauri-x86_64-win -name "*.msi" -exec cp {} release/ClamAI-x86_64-win.msi \; 2>/dev/null || true
          find artifacts/tauri-x86_64-linux -name "*.deb" -exec cp {} release/ClamAI-x86_64-linux.deb \; 2>/dev/null || true
          find artifacts/tauri-x86_64-linux -name "*.AppImage" -exec cp {} release/ClamAI-x86_64-linux.AppImage \; 2>/dev/null || true
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
