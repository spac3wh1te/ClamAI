name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.6.1)"
        required: false
        type: string

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"

jobs:
  frontend:
    name: Frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  go-service:
    name: Go (${{ matrix.target }})
    runs-on: windows-latest
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-win
            goos: windows
            goarch: amd64
            output: ClamAI-Server.exe
          - target: x86_64-linux
            goos: linux
            goarch: amd64
            output: ClamAI-Server
          - target: arm64-win
            goos: windows
            goarch: arm64
            output: ClamAI-Server.exe
          - target: arm64-linux
            goos: linux
            goarch: arm64
            output: ClamAI-Server
          - target: x86_64-mac
            goos: darwin
            goarch: amd64
            output: ClamAI-Server
          - target: arm64-mac
            goos: darwin
            goarch: arm64
            output: ClamAI-Server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - shell: pwsh
        run: |
          if (-not (Test-Path "server\frontend")) { New-Item -ItemType Directory -Path "server\frontend" -Force }
          Copy-Item -Recurse -Force dist\* server\frontend\dist\
      - shell: pwsh
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) { $ver = "${{ github.ref_name }}" -replace '^v','' }
          $ldflags = ""
          if ("${{ matrix.goos }}" -eq "windows") { $ldflags = "-H windowsgui" }
          $ldflags += " -X main.BuildVersion=$ver"
          cd server
          go build -ldflags="$($ldflags.Trim())" -tags server -o "${{ matrix.output }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: service-${{ matrix.target }}
          path: server/${{ matrix.output }}

  tauri-windows:
    name: Tauri Windows (${{ matrix.target }})
    runs-on: windows-latest
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-win
            rust-target: x86_64-pc-windows-msvc
          - target: arm64-win
            rust-target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - run: npm ci
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          CARGO_TARGET_DIR: ${{ github.workspace }}/target
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }}
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            target/${{ matrix.rust-target }}/release/bundle/nsis/*.exe
            target/${{ matrix.rust-target }}/release/clamai.exe

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [go-service, tauri-windows]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Organize artifacts
        run: |
          mkdir -p release
          echo "--- Packaging Windows x86_64 ---"
          mkdir -p pack/win-x64
          cp artifacts/service-x86_64-win/ClamAI-Server.exe pack/win-x64/ClamAI-Server.exe
          cp artifacts/tauri-x86_64-win/clamai.exe pack/win-x64/ClamAI.exe 2>/dev/null || true
          find artifacts/tauri-x86_64-win -name "*.msi" -exec cp {} pack/win-x64/ \; 2>/dev/null || true
          find artifacts/tauri-x86_64-win -name "*-setup.exe" -exec cp {} pack/win-x64/ \; 2>/dev/null || true
          cd pack/win-x64 && zip -r ../../release/ClamAI-win-x64.zip . && cd -
          echo "--- Packaging Windows ARM64 ---"
          mkdir -p pack/win-arm64
          cp artifacts/service-arm64-win/ClamAI-Server.exe pack/win-arm64/ClamAI-Server.exe
          cp artifacts/tauri-arm64-win/clamai.exe pack/win-arm64/ClamAI.exe 2>/dev/null || true
          find artifacts/tauri-arm64-win -name "*.msi" -exec cp {} pack/win-arm64/ \; 2>/dev/null || true
          find artifacts/tauri-arm64-win -name "*-setup.exe" -exec cp {} pack/win-arm64/ \; 2>/dev/null || true
          cd pack/win-arm64 && zip -r ../../release/ClamAI-win-arm64.zip . && cd -
          echo "--- Packaging Linux x86_64 ---"
          cp artifacts/service-x86_64-linux/ClamAI-Server release/ClamAI-Server-linux-x64
          echo "--- Packaging Linux ARM64 ---"
          cp artifacts/service-arm64-linux/ClamAI-Server release/ClamAI-Server-linux-arm64
          echo "--- Packaging macOS x86_64 ---"
          cp artifacts/service-x86_64-mac/ClamAI-Server release/ClamAI-Server-macos-x64 2>/dev/null || true
          echo "--- Packaging macOS ARM64 ---"
          cp artifacts/service-arm64-mac/ClamAI-Server release/ClamAI-Server-macos-arm64 2>/dev/null || true
          echo "=== Release artifacts ==="
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
