name: Build & Release

on:
  push:
    tags: ["v*"]
  workflow_dispatch:
    inputs:
      version:
        description: "Version (e.g. 0.6.1)"
        required: false
        type: string

env:
  GO_VERSION: "1.24"
  NODE_VERSION: "20"
  RUST_VERSION: "stable"

jobs:
  frontend:
    name: Frontend
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - run: npm ci
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: dist/

  go-service:
    name: Go Service (${{ matrix.target }})
    runs-on: windows-latest
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-win
            goos: windows
            goarch: amd64
            output: ClamAI-Server.exe
          - target: x86_64-linux
            goos: linux
            goarch: amd64
            output: ClamAI-Server
          - target: arm64-win
            goos: windows
            goarch: arm64
            output: ClamAI-Server.exe
          - target: arm64-linux
            goos: linux
            goarch: arm64
            output: ClamAI-Server
          - target: x86_64-mac
            goos: darwin
            goarch: amd64
            output: ClamAI-Server
          - target: arm64-mac
            goos: darwin
            goarch: arm64
            output: ClamAI-Server
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - shell: pwsh
        run: |
          if (-not (Test-Path "server\frontend")) { New-Item -ItemType Directory -Path "server\frontend" -Force }
          Copy-Item -Recurse -Force dist\* server\frontend\dist\
      - shell: pwsh
        env:
          CGO_ENABLED: 0
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
        run: |
          $ver = "${{ github.event.inputs.version }}"
          if (-not $ver) {
            $tag = "${{ github.ref_name }}"
            $ver = $tag -replace '^v',''
          }
          $ldflags = ""
          if ("${{ matrix.goos }}" -eq "windows") { $ldflags = "-H windowsgui" }
          $ldflags += " -X main.BuildVersion=$ver"
          cd server
          go build -ldflags="$($ldflags.Trim())" -tags server -o "${{ matrix.output }}" .
      - uses: actions/upload-artifact@v4
        with:
          name: service-${{ matrix.target }}
          path: server/${{ matrix.output }}

  tauri-windows:
    name: Tauri Windows (${{ matrix.target }})
    runs-on: windows-latest
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-win
            rust-target: x86_64-pc-windows-msvc
          - target: arm64-win
            rust-target: aarch64-pc-windows-msvc
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - run: npm ci
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }}
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/msi/*.msi
            src-tauri/target/${{ matrix.rust-target }}/release/clamai.exe

  tauri-linux-x64:
    name: Tauri Linux (x86_64)
    runs-on: ubuntu-latest
    needs: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - name: Install Linux dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf libssl-dev
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-unknown-linux-gnu
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - run: npm ci
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: --target x86_64-unknown-linux-gnu
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-x86_64-linux
          path: |
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.deb
            src-tauri/target/x86_64-unknown-linux-gnu/release/bundle/**/*.AppImage
            src-tauri/target/x86_64-unknown-linux-gnu/release/clamai

  tauri-macos:
    name: Tauri macOS (${{ matrix.target }})
    runs-on: macos-latest
    needs: frontend
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-mac
            rust-target: x86_64-apple-darwin
          - target: arm64-mac
            rust-target: aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.rust-target }}
      - uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: dist/
      - run: npm ci
      - name: Build Tauri
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tauriScript: npx tauri
          args: --target ${{ matrix.rust-target }}
      - uses: actions/upload-artifact@v4
        with:
          name: tauri-${{ matrix.target }}
          path: |
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/dmg/*.dmg
            src-tauri/target/${{ matrix.rust-target }}/release/bundle/macos/*.app
            src-tauri/target/${{ matrix.rust-target }}/release/clamai

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    needs: [go-service, tauri-windows, tauri-linux-x64, tauri-macos]
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
      - name: Organize artifacts
        run: |
          mkdir -p release
          cp artifacts/service-x86_64-win/ClamAI-Server.exe        release/ClamAI-Server-x86_64-win.exe
          cp artifacts/service-x86_64-linux/ClamAI-Server          release/ClamAI-Server-x86_64-linux
          cp artifacts/service-arm64-win/ClamAI-Server.exe         release/ClamAI-Server-arm64-win.exe
          cp artifacts/service-arm64-linux/ClamAI-Server           release/ClamAI-Server-arm64-linux
          cp artifacts/service-x86_64-mac/ClamAI-Server            release/ClamAI-Server-x86_64-macos 2>/dev/null || true
          cp artifacts/service-arm64-mac/ClamAI-Server             release/ClamAI-Server-arm64-macos 2>/dev/null || true
          cp artifacts/tauri-x86_64-win/clamai.exe                 release/ClamAI-x86_64-win.exe 2>/dev/null || true
          find artifacts/tauri-x86_64-win -name "*.msi" -exec cp {} release/ClamAI-x86_64-win.msi \; 2>/dev/null || true
          cp artifacts/tauri-arm64-win/clamai.exe                  release/ClamAI-arm64-win.exe 2>/dev/null || true
          find artifacts/tauri-arm64-win -name "*.msi" -exec cp {} release/ClamAI-arm64-win.msi \; 2>/dev/null || true
          find artifacts/tauri-x86_64-linux -name "*.deb" -exec cp {} release/ClamAI-x86_64-linux.deb \; 2>/dev/null || true
          find artifacts/tauri-x86_64-linux -name "*.AppImage" -exec cp {} release/ClamAI-x86_64-linux.AppImage \; 2>/dev/null || true
          find artifacts/tauri-x86_64-linux -name "clamai" -exec cp {} release/ClamAI-x86_64-linux \; 2>/dev/null || true
          find artifacts/tauri-x86_64-mac -name "*.dmg" -exec cp {} release/ClamAI-x86_64-macos.dmg \; 2>/dev/null || true
          find artifacts/tauri-arm64-mac -name "*.dmg" -exec cp {} release/ClamAI-arm64-macos.dmg \; 2>/dev/null || true
          find artifacts/tauri-x86_64-mac -name "clamai" -exec cp {} release/ClamAI-x86_64-macos \; 2>/dev/null || true
          find artifacts/tauri-arm64-mac -name "clamai" -exec cp {} release/ClamAI-arm64-macos \; 2>/dev/null || true
          echo "=== Release artifacts ==="
          ls -la release/
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release/*
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
